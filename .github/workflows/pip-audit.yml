name: pip-audit

# T2 学び literal 反映 (doctrine: analogical-recall、 T2 commit 76eb283):
# pip-audit に --disable-pip flag は use しない (hashed requirements 必須 or --no-deps 必須エラー)。
# 本 file で flag 不在 を literal 維持、 T3-T5 sibling 共通 pattern。

on:
  push:
    branches: [main]
    paths:
      - "requirements*.txt"
      - ".github/workflows/pip-audit.yml"
  pull_request:
    paths:
      - "requirements*.txt"
      - ".github/workflows/pip-audit.yml"
  schedule:
    - cron: "0 0 * * 1"  # weekly Monday 09:00 JST (00:00 UTC)
  workflow_dispatch:

jobs:
  audit-week0:
    runs-on: ubuntu-latest
    name: audit requirements-week0 (active stack, fail-on-high)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Week 0 active stack
        run: pip-audit -r requirements-week0.txt --strict

  audit-week1:
    runs-on: ubuntu-latest
    name: audit requirements-week1 (active stack, fail-on-high, ADR-201 軸 ④)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Week 1 active stack
        # ADR-201 6 軸 mitigation 軸 ① pin version (langgraph >=1.0.10 + langgraph-checkpoint >=4.0
        # + langchain-core >=1.2.5) + 軸 ④ pip-audit CI strict fail-on-high で新 CVE literal block
        run: pip-audit -r requirements-week1.txt --strict

  audit-week4:
    runs-on: ubuntu-latest
    name: audit requirements-week4 (active stack, fail-on-high)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Week 4 active stack
        # Week 4 = fastapi + uvicorn + jinja2 + cryptography + playwright (T1/T2 inherit pin)
        run: pip-audit -r requirements-week4.txt --strict
